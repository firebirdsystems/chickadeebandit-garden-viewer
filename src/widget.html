<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garden Widget</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--hub-font, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      font-size: 13px;
      background: #fff;
      color: #111827;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 8px; border-bottom: 1px solid #e5e7eb; flex-shrink: 0;
    }
    .header-title { font-weight: 600; font-size: 13px; }
    .header-count { font-size: 11px; color: #6b7280; }

    .garden-list { flex: 1; overflow-y: auto; }

    .garden-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px; border-bottom: 1px solid #f3f4f6;
    }
    .garden-row:last-child { border-bottom: none; }

    .garden-icon {
      font-size: 16px; flex-shrink: 0; line-height: 1;
    }
    .garden-info { flex: 1; min-width: 0; }
    .garden-name {
      font-size: 12.5px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .garden-sub { font-size: 11px; color: #6b7280; margin-top: 1px; }

    .plant-count {
      font-size: 11px; font-weight: 600; color: #059669;
      background: #d1fae5; border-radius: 10px; padding: 1px 7px; flex-shrink: 0;
    }

    .footer {
      padding: 6px 14px; border-top: 1px solid #e5e7eb;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; background: #f9fafb;
    }
    .footer-hint { font-size: 11px; color: #9ca3af; }
    .open-link { font-size: 11px; font-weight: 600; color: #111827; text-decoration: none; }
    .open-link:hover { text-decoration: underline; }

    .empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #9ca3af; font-size: 12px; gap: 6px; padding: 12px; text-align: center;
    }
  </style>
</head>
<body>
<script type="module">
const DB     = window.__DB_URL ?? "";
const APP_ID = "garden-viewer";

function esc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

async function dbq(sql, params = []) {
  if (!DB) return { rows: [] };
  const res = await fetch(DB, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sql, params }),
  });
  return res.json();
}

async function load() {
  const [{ rows: gardens }, { rows: counts }] = await Promise.all([
    dbq(`SELECT id, name, garden_type FROM gardens ORDER BY name ASC`),
    dbq(`SELECT garden_id, COUNT(*) AS cnt FROM plants GROUP BY garden_id`),
  ]);

  const countMap = Object.fromEntries(counts.map(r => [r.garden_id, r.cnt]));
  const totalPlants = counts.reduce((s, r) => s + r.cnt, 0);

  const header = `
    <div class="header">
      <span class="header-title">Gardens</span>
      <span class="header-count">${totalPlants} plant${totalPlants !== 1 ? "s" : ""}</span>
    </div>`;

  let body;
  if (gardens.length === 0) {
    body = `<div class="empty">
      <span>No plants yet</span>
      <span style="font-size:11px">Add from the iOS app</span>
    </div>`;
  } else {
    const icon = t => t === "raised_bed" ? "🌱" : t === "container" ? "🪴" : "🌿";
    body = `<div class="garden-list">
      ${gardens.map(g => {
        const cnt = countMap[g.id] ?? 0;
        return `<div class="garden-row">
          <div class="garden-icon">${icon(g.garden_type)}</div>
          <div class="garden-info">
            <div class="garden-name">${esc(g.name)}</div>
            <div class="garden-sub">${g.garden_type.replace(/_/g," ")}</div>
          </div>
          <div class="plant-count">${cnt}</div>
        </div>`;
      }).join("")}
    </div>`;
  }

  const footer = `
    <div class="footer">
      <span class="footer-hint">Synced from iOS app</span>
      <a class="open-link" href="/open/${APP_ID}" onclick="window.__HUB_OPEN && (event.preventDefault(), window.__HUB_OPEN('${APP_ID}'))">View gardens →</a>
    </div>`;

  document.body.innerHTML = header + body + footer;
}

load().catch(() => {
  document.body.innerHTML = `<div class="empty"><a href="/open/${APP_ID}" style="color:#111827;font-weight:600">Open Garden Viewer →</a></div>`;
});
</script>
</body>
</html>
